spring:
  application:
    name: backend
  datasource:
    url: jdbc:mysql://localhost:3306/doogwaja?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

jwt:
  secret: dogwaja-secret-key-must-be-at-least-256-bits-long-for-hs256
  access-expiration: 1800000   # 30분 (ms)
  refresh-expiration: 604800000 # 7일 (ms)

server:
  port: 8080
